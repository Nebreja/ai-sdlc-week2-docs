site_name: AI SDLC Workflow — Week 2 Docs
site_description: Planning, architecture, development, RAG, and testing — one open-source, BYOK toolchain.

nav:
  - Home: index.md
  - PM + Documentation: pm-notes.md
  - Architecture: architecture.md
  - Development: development.md
  - RAG Knowledgebase: rag-knowledgebase.md
  - Testing & Observability: testing-observability.md

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: green
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.critic

extra_css:
  - stylesheets/extra.css

# Team reference — apply on each page's H1 with an inline span, e.g.:
#   # Architecture <span class="owner-badge" data-owner="jenilyn">Jenilyn</span>
#
# Recognized data-owner values (each gets its own accent dot):
#   jenilyn   -> Architecture
#   daryll    -> Development
#   reymel    -> RAG Knowledgebase
#   vincent   -> Testing & Observability
#   harlyn    -> PM Notes
